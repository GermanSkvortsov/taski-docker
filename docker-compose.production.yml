volumes:
  pg_data_production:
  static_volume:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U django_user -d django"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: geravalerin/taski_backend
    env_file: .env
    volumes:
      - static_volume:/backend_static
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: geravalerin/taski_frontend
    env_file: .env
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_volume:/frontend_static

  gateway:
    image: geravalerin/taski_gateway
    env_file: .env
    volumes:
      - static_volume:/staticfiles/
    ports:
      - 8000:80